name: DevSecOps Security Pipeline

on: [push]

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Bandit
      run: pip install bandit

    - name: Run Bandit Security Scan
      run: bandit -r .
